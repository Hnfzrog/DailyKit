<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Generator — DailyKit</title>
  <!--
  ADSENSE: Uncomment after approval.
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
  -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
    p, h1, h2, h3 { margin: 0; }

    .ad-slot { width: 100%; padding: 0.4rem 0; background: rgba(0,0,0,0.03); }
    .ad-ph {
      max-width: 1000px; margin: 0 auto; min-height: 80px;
      border: 1px dashed #e2e8f0; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .top-nav {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 0.7rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-link { color: #0284c7; font-weight: 600; font-size: 0.9rem; }
    .tool-title { font-weight: 700; }

    .wrap { max-width: 1000px; margin: 1.5rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 1.3fr; gap: 1.5rem; }
    @media (max-width: 780px) { .wrap { grid-template-columns: 1fr; } }

    /* Form side */
    .form-side {}
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 1.2rem; margin-bottom: 1rem; }
    .card h2 { font-size: 0.9rem; color: #0284c7; margin-bottom: 0.85rem; font-weight: 700; }
    .field { display: flex; flex-direction: column; gap: 0.28rem; margin-bottom: 0.7rem; }
    .field label { font-size: 0.78rem; font-weight: 600; color: #64748b; }
    .field input, .field select, .field textarea {
      border: 1px solid #e2e8f0; border-radius: 7px;
      padding: 0.55rem 0.7rem; font: inherit; background: #f8fafc; font-size: 0.88rem;
    }
    .field input:focus, .field select:focus { outline: none; border-color: #0284c7; background: #fff; }
    .field textarea { resize: vertical; min-height: 60px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }

    /* Line items */
    .line-items {}
    .line-head { display: grid; grid-template-columns: 2fr 0.7fr 1fr auto; gap: 0.4rem; font-size: 0.72rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; padding: 0 0.2rem; }
    .line-item { display: grid; grid-template-columns: 2fr 0.7fr 1fr auto; gap: 0.4rem; margin-bottom: 0.4rem; align-items: center; }
    .line-item input {
      border: 1px solid #e2e8f0; border-radius: 7px;
      padding: 0.5rem 0.5rem; font: inherit; font-size: 0.85rem; background: #f8fafc;
    }
    .line-item input:focus { outline: none; border-color: #0284c7; background: #fff; }
    .del-line { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 1rem; padding: 0 0.2rem; }
    .del-line:hover { color: #f43f5e; }
    .add-line { background: none; border: 1px dashed #cbd5e1; color: #64748b; border-radius: 7px; width: 100%; padding: 0.45rem; font: inherit; font-size: 0.82rem; cursor: pointer; margin-top: 0.2rem; }
    .add-line:hover { border-color: #0284c7; color: #0284c7; }

    .gen-btn {
      width: 100%; padding: 0.8rem; background: #0284c7; color: #fff;
      border: none; border-radius: 10px; font: inherit; font-weight: 700;
      font-size: 0.95rem; cursor: pointer;
    }
    .gen-btn:hover { background: #0369a1; }

    /* Invoice preview */
    .invoice-preview { position: sticky; top: 1rem; }
    .invoice-actions {
      display: flex; gap: 0.6rem; margin-bottom: 0.75rem;
    }
    .btn-act { padding: 0.55rem 1rem; border-radius: 8px; font: inherit; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
    .btn-print { background: #0284c7; color: #fff; border: none; }
    .btn-print:hover { background: #0369a1; }
    .btn-sec { background: #fff; color: #334155; border: 1px solid #e2e8f0; }
    .btn-sec:hover { background: #f8fafc; }

    /* The actual invoice */
    #invoiceDoc {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 14px;
      padding: 1.5rem; min-height: 500px;
    }
    .inv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
    .inv-brand { font-size: 1.3rem; font-weight: 800; color: #0284c7; }
    .inv-brand p { font-size: 0.8rem; color: #64748b; font-weight: 400; margin-top: 0.2rem; }
    .inv-meta { text-align: right; font-size: 0.82rem; color: #64748b; }
    .inv-meta strong { display: block; font-size: 1rem; color: #1e293b; }
    .inv-divider { border: none; border-top: 1.5px solid #e2e8f0; margin: 1rem 0; }
    .inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .inv-party-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; color: #94a3b8; font-weight: 700; margin-bottom: 0.3rem; }
    .inv-party-name { font-weight: 700; }
    .inv-party-details { font-size: 0.8rem; color: #64748b; line-height: 1.55; }
    table.items-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 0.75rem 0; }
    table.items-table th {
      background: #f8fafc; padding: 0.5rem 0.6rem;
      text-align: left; font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: #94a3b8; border-bottom: 1px solid #e2e8f0;
    }
    table.items-table td { padding: 0.5rem 0.6rem; border-bottom: 1px solid #f1f5f9; }
    table.items-table td:last-child, table.items-table th:last-child { text-align: right; }
    .totals { margin-left: auto; width: 220px; }
    .total-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 0.25rem 0; }
    .total-row.grand { font-weight: 800; font-size: 1rem; padding-top: 0.5rem; border-top: 1.5px solid #e2e8f0; margin-top: 0.2rem; color: #0284c7; }
    .inv-notes { margin-top: 1.5rem; font-size: 0.8rem; color: #64748b; line-height: 1.6; }
    .inv-footer { margin-top: 2rem; font-size: 0.75rem; color: #94a3b8; text-align: center; border-top: 1px solid #f1f5f9; padding-top: 0.75rem; }

    @media print {
      .ad-slot, .top-nav, .form-side, .invoice-actions { display: none !important; }
      .wrap { display: block; }
      #invoiceDoc { border: none; padding: 0; }
      .invoice-preview { position: static; }
    }
  </style>
</head>
<body>

<div class="ad-slot">
  <!--
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
    data-ad-slot="SLOT_ID_1" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  -->
  <div class="ad-ph">Advertisement</div>
</div>

<nav class="top-nav">
  <a class="back-link" href="../index.html">← All Tools</a>
  <span class="tool-title">🧾 Invoice Generator</span>
  <span></span>
</nav>

<div class="wrap">
  <!-- FORM SIDE -->
  <div class="form-side">

    <div class="card">
      <h2>Your Business (From)</h2>
      <div class="field"><label>Business / Your Name</label><input id="fromName" type="text" placeholder="Toko Maju Jaya" /></div>
      <div class="field"><label>Address</label><textarea id="fromAddr" rows="2" placeholder="Jl. Sudirman No. 1, Jakarta"></textarea></div>
      <div class="field-row">
        <div class="field"><label>Email</label><input id="fromEmail" type="email" placeholder="toko@email.com" /></div>
        <div class="field"><label>Phone</label><input id="fromPhone" type="tel" placeholder="+62 812-xxxx" /></div>
      </div>
    </div>

    <div class="card">
      <h2>Client (Bill To)</h2>
      <div class="field"><label>Client Name</label><input id="toName" type="text" placeholder="PT Maju Bersama" /></div>
      <div class="field"><label>Address</label><textarea id="toAddr" rows="2" placeholder="Jl. Gatot Subroto, Jakarta"></textarea></div>
      <div class="field"><label>Email</label><input id="toEmail" type="email" placeholder="client@email.com" /></div>
    </div>

    <div class="card">
      <h2>Invoice Details</h2>
      <div class="field-row">
        <div class="field"><label>Invoice #</label><input id="invNum" type="text" placeholder="INV-001" /></div>
        <div class="field"><label>Date</label><input id="invDate" type="date" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Due Date</label><input id="dueDate" type="date" /></div>
        <div class="field">
          <label>Currency</label>
          <select id="currency">
            <option value="Rp">IDR (Rp)</option>
            <option value="USD $">USD ($)</option>
            <option value="SGD $">SGD ($)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Line Items</h2>
      <div class="line-head"><span>Description</span><span>Qty</span><span>Price</span><span></span></div>
      <div id="lineItems">
        <div class="line-item">
          <input type="text" placeholder="Service / Product" class="desc" oninput="recalc()" />
          <input type="number" placeholder="1" value="1" class="qty" min="1" oninput="recalc()" />
          <input type="number" placeholder="0" value="" class="price" min="0" oninput="recalc()" />
          <button class="del-line" onclick="delLine(this)">✕</button>
        </div>
      </div>
      <button class="add-line" onclick="addLine()">+ Add Item</button>
    </div>

    <div class="card">
      <h2>Totals &amp; Notes</h2>
      <div class="field-row">
        <div class="field"><label>Tax (%)</label><input id="taxRate" type="number" value="0" min="0" max="100" oninput="recalc()" /></div>
        <div class="field"><label>Discount (%)</label><input id="discountRate" type="number" value="0" min="0" max="100" oninput="recalc()" /></div>
      </div>
      <div class="field"><label>Notes / Payment Instructions</label><textarea id="invNotes" rows="2" placeholder="Please transfer to: BCA 1234567890 a/n Toko Maju Jaya. Payment due within 7 days."></textarea></div>
    </div>

    <button class="gen-btn" onclick="generateInvoice()">🧾 Generate Invoice</button>
  </div>

  <!-- INVOICE PREVIEW -->
  <div class="invoice-preview">
    <div class="invoice-actions">
      <button class="btn-act btn-print" onclick="window.print()">🖨 Print / Save PDF</button>
      <button class="btn-act btn-sec" onclick="generateInvoice()">↻ Refresh</button>
    </div>
    <div id="invoiceDoc">
      <p style="color:#94a3b8; text-align:center; padding:2rem; font-size:0.9rem;">Fill in the form and click Generate Invoice.</p>
    </div>
  </div>
</div>

<div style="max-width:1000px; margin:0 auto; padding:0 1rem 2rem;">
  <div class="ad-slot">
    <!--
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
      data-ad-slot="SLOT_ID_2" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    <div class="ad-ph">Advertisement</div>
  </div>
</div>

<script>
  function addLine() {
    const d = document.createElement('div');
    d.className = 'line-item';
    d.innerHTML = `
      <input type="text" placeholder="Description" class="desc" oninput="recalc()" />
      <input type="number" placeholder="1" value="1" class="qty" min="1" oninput="recalc()" />
      <input type="number" placeholder="0" value="" class="price" min="0" oninput="recalc()" />
      <button class="del-line" onclick="delLine(this)">✕</button>`;
    document.getElementById('lineItems').appendChild(d);
  }

  function delLine(btn) {
    const items = document.querySelectorAll('.line-item');
    if (items.length <= 1) return;
    btn.closest('.line-item').remove();
    recalc();
  }

  function recalc() { /* live totals could go here */ }

  function fmtMoney(n, cur) { return cur + ' ' + Math.abs(n).toLocaleString('id-ID'); }
  function v(id) { return document.getElementById(id).value.trim(); }

  function generateInvoice() {
    const cur      = v('currency');
    const tax      = parseFloat(v('taxRate')) || 0;
    const disc     = parseFloat(v('discountRate')) || 0;
    const items    = [];
    let subtotal   = 0;

    document.querySelectorAll('.line-item').forEach(row => {
      const desc  = row.querySelector('.desc').value.trim();
      const qty   = parseFloat(row.querySelector('.qty').value) || 1;
      const price = parseFloat(row.querySelector('.price').value) || 0;
      if (desc || price) {
        items.push({ desc: desc || 'Item', qty, price, total: qty * price });
        subtotal += qty * price;
      }
    });

    const discAmt  = subtotal * disc / 100;
    const taxAmt   = (subtotal - discAmt) * tax / 100;
    const grand    = subtotal - discAmt + taxAmt;

    const html = `
      <div class="inv-header">
        <div>
          <div class="inv-brand">${v('fromName') || 'Your Business'}<p>${(v('fromAddr') || '').replace(/\n/g,'<br/>')}</p><p>${v('fromEmail')} ${v('fromPhone')}</p></div>
        </div>
        <div class="inv-meta">
          <strong>INVOICE</strong>
          <div>#${v('invNum') || 'INV-001'}</div>
          <div>Date: ${v('invDate') || new Date().toLocaleDateString('id-ID')}</div>
          <div>Due: ${v('dueDate') || '—'}</div>
        </div>
      </div>
      <hr class="inv-divider" />
      <div class="inv-parties">
        <div>
          <div class="inv-party-label">From</div>
          <div class="inv-party-name">${v('fromName') || '—'}</div>
          <div class="inv-party-details">${v('fromEmail')}<br>${v('fromPhone')}</div>
        </div>
        <div>
          <div class="inv-party-label">Bill To</div>
          <div class="inv-party-name">${v('toName') || '—'}</div>
          <div class="inv-party-details">${(v('toAddr') || '').replace(/\n/g,'<br/>')}<br>${v('toEmail')}</div>
        </div>
      </div>
      <table class="items-table">
        <thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
        <tbody>
          ${items.map(i => `<tr><td>${i.desc}</td><td>${i.qty}</td><td>${fmtMoney(i.price, cur)}</td><td>${fmtMoney(i.total, cur)}</td></tr>`).join('') || '<tr><td colspan="4" style="color:#94a3b8;text-align:center">No items</td></tr>'}
        </tbody>
      </table>
      <div class="totals">
        <div class="total-row"><span>Subtotal</span><span>${fmtMoney(subtotal, cur)}</span></div>
        ${disc ? `<div class="total-row"><span>Discount (${disc}%)</span><span>−${fmtMoney(discAmt, cur)}</span></div>` : ''}
        ${tax  ? `<div class="total-row"><span>Tax (${tax}%)</span><span>${fmtMoney(taxAmt, cur)}</span></div>` : ''}
        <div class="total-row grand"><span>TOTAL</span><span>${fmtMoney(grand, cur)}</span></div>
      </div>
      ${v('invNotes') ? `<div class="inv-notes"><strong>Notes:</strong><br>${v('invNotes').replace(/\n/g,'<br/>')}</div>` : ''}
      <div class="inv-footer">Generated by DailyKit Invoice Generator · dailykit.app</div>
    `;
    document.getElementById('invoiceDoc').innerHTML = html;
    document.getElementById('invoiceDoc').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // defaults
  document.getElementById('invNum').value  = 'INV-' + String(Math.floor(Math.random() * 900) + 100).padStart(3,'0');
  document.getElementById('invDate').value = new Date().toISOString().split('T')[0];
  const due = new Date(); due.setDate(due.getDate() + 14);
  document.getElementById('dueDate').value = due.toISOString().split('T')[0];
</script>
</body>
</html>
