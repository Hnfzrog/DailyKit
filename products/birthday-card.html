<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Card Maker — DailyKit</title>
  <!--
  ADSENSE: Uncomment after approval.
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
  -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdf4ff; color: #1e293b; }
    p, h1, h2 { margin: 0; }

    .ad-slot { width: 100%; padding: 0.4rem 0; background: rgba(0,0,0,0.03); }
    .ad-ph {
      max-width: 900px; margin: 0 auto; min-height: 80px;
      border: 1px dashed #e9d5ff; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .top-nav {
      background: #fff; border-bottom: 1px solid #f3e8ff;
      padding: 0.7rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-link { color: #9333ea; font-weight: 600; font-size: 0.9rem; }
    .tool-title { font-weight: 700; }

    .wrap { max-width: 960px; margin: 1.5rem auto; padding: 0 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 720px) { .wrap { grid-template-columns: 1fr; } }

    /* Form */
    .form-panel {
      background: #fff; border: 1px solid #f3e8ff; border-radius: 16px; padding: 1.5rem;
    }
    .form-panel h2 { font-size: 1.05rem; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.82rem; font-weight: 600; color: #7c3aed; }
    .field input, .field textarea, .field select {
      border: 1px solid #e9d5ff; border-radius: 8px;
      padding: 0.6rem 0.75rem; font: inherit; background: #faf5ff;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: #9333ea; background: #fff; }
    .field textarea { resize: vertical; min-height: 85px; }
    .colors { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .color-opt { width: 28px; height: 28px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; }
    .color-opt.active { border-color: #1e293b; }
    .btn-share {
      width: 100%; padding: 0.75rem;
      background: #9333ea; color: #fff; border: none;
      border-radius: 10px; font: inherit; font-weight: 700; cursor: pointer;
      margin-top: 0.25rem;
    }
    .btn-share:hover { background: #7c3aed; }
    .btn-print {
      width: 100%; padding: 0.6rem;
      background: #fff; color: #7c3aed; border: 1px solid #e9d5ff;
      border-radius: 10px; font: inherit; font-weight: 600; cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn-print:hover { background: #faf5ff; }

    /* Card preview */
    .preview-panel { background: #fff; border: 1px solid #f3e8ff; border-radius: 16px; padding: 1.5rem; }
    .preview-panel h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 1rem; }

    .bday-card {
      border-radius: 14px; padding: 2rem 1.5rem;
      text-align: center; position: relative; overflow: hidden;
      min-height: 380px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.6rem;
    }
    .bday-to   { font-size: 0.85rem; opacity: 0.8; }
    .bday-name { font-family: 'Pacifico', cursive; font-size: clamp(1.6rem, 4vw, 2.4rem); line-height: 1.2; }
    .bday-emoji { font-size: 3rem; animation: bounce 0.9s ease-in-out infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
    .bday-msg  { font-size: 0.95rem; opacity: 0.9; max-width: 30ch; line-height: 1.65; }
    .bday-from { font-size: 0.82rem; opacity: 0.7; }

    /* Confetti canvas */
    #confettiCanvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
    }

    .bot-wrap { max-width: 960px; margin: 0 auto; padding: 0 1rem 2rem; }

    @media print {
      .ad-slot, .top-nav, .form-panel, .preview-panel h2 { display: none !important; }
      .wrap { display: block; }
      .bday-card { min-height: unset; }
    }
  </style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>

<div class="ad-slot">
  <!--
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
    data-ad-slot="SLOT_ID_1" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  -->
  <div class="ad-ph">Advertisement</div>
</div>

<nav class="top-nav">
  <a class="back-link" href="../index.html">← All Tools</a>
  <span class="tool-title">🎂 Birthday Card Maker</span>
  <span></span>
</nav>

<div class="wrap">
  <!-- FORM -->
  <div class="form-panel">
    <h2>Customize Your Card</h2>
    <div class="field">
      <label>To (Recipient Name)</label>
      <input type="text" id="toName" placeholder="Sarah" oninput="update()" />
    </div>
    <div class="field">
      <label>From</label>
      <input type="text" id="fromName" placeholder="Your Name" oninput="update()" />
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="message" oninput="update()">Wishing you a day full of joy, laughter, and all the things that make you smile the most. Have a wonderful birthday! 🎉</textarea>
    </div>
    <div class="field">
      <label>Card Color Theme</label>
      <div class="colors">
        <div class="color-opt active" style="background:#f5d0fe" data-bg="#fdf4ff" data-text="#7c3aed" data-accent="#9333ea" onclick="setTheme(this)"></div>
        <div class="color-opt" style="background:#fbbf24" data-bg="#fffbeb" data-text="#b45309" data-accent="#d97706" onclick="setTheme(this)"></div>
        <div class="color-opt" style="background:#6ee7b7" data-bg="#ecfdf5" data-text="#065f46" data-accent="#059669" onclick="setTheme(this)"></div>
        <div class="color-opt" style="background:#93c5fd" data-bg="#eff6ff" data-text="#1d4ed8" data-accent="#2563eb" onclick="setTheme(this)"></div>
        <div class="color-opt" style="background:#fca5a5" data-bg="#fff1f2" data-text="#be123c" data-accent="#f43f5e" onclick="setTheme(this)"></div>
      </div>
    </div>
    <div class="field">
      <label>Emoji Decoration</label>
      <select id="emojiPick" onchange="update()">
        <option value="🎂">🎂 Birthday Cake</option>
        <option value="🎉">🎉 Party Popper</option>
        <option value="🎁">🎁 Gift Box</option>
        <option value="🌸">🌸 Blossom</option>
        <option value="🦋">🦋 Butterfly</option>
        <option value="⭐">⭐ Star</option>
      </select>
    </div>
    <button class="btn-share" onclick="launchConfetti()">🎊 Celebrate!</button>
    <button class="btn-print" onclick="window.print()">🖨 Print Card</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <h2>Preview</h2>
    <div class="bday-card" id="bdayCard" style="background:#fdf4ff; color:#7c3aed">
      <span class="bday-to">Happy Birthday,</span>
      <div class="bday-name" id="cardName">Sarah</div>
      <div class="bday-emoji" id="cardEmoji">🎂</div>
      <p class="bday-msg" id="cardMsg">Wishing you a day full of joy, laughter, and all the things that make you smile the most. Have a wonderful birthday! 🎉</p>
      <span class="bday-from" id="cardFrom">— Your Name</span>
    </div>
  </div>
</div>

<div class="bot-wrap">
  <div class="ad-slot" style="margin-bottom:2rem">
    <!--
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
      data-ad-slot="SLOT_ID_2" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    <div class="ad-ph">Advertisement</div>
  </div>
</div>

<script>
  const colors = ['#f43f5e','#f97316','#f59e0b','#10b981','#06b6d4','#3b82f6','#a78bfa','#ec4899'];
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [], animId;

  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);

  function launchConfetti() {
    cancelAnimationFrame(animId);
    particles = [];
    for (let i = 0; i < 180; i++) {
      particles.push({
        x: Math.random() * innerWidth,
        y: -10 - Math.random() * 200,
        vx: (Math.random() - 0.5) * 4,
        vy: 2 + Math.random() * 4,
        w: 8 + Math.random() * 8,
        h: 4 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.2,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 1
      });
    }
    animate();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      p.vy += 0.08;
      if (p.y < canvas.height + 20) { alive = true; }
      if (p.y > canvas.height + 20) { p.alpha -= 0.05; }
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    if (alive) animId = requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function update() {
    document.getElementById('cardName').textContent = document.getElementById('toName').value || 'Sarah';
    document.getElementById('cardMsg').textContent  = document.getElementById('message').value;
    document.getElementById('cardFrom').textContent = '— ' + (document.getElementById('fromName').value || 'Your Name');
    document.getElementById('cardEmoji').textContent = document.getElementById('emojiPick').value;
  }

  function setTheme(el) {
    document.querySelectorAll('.color-opt').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    const card = document.getElementById('bdayCard');
    card.style.background = el.dataset.bg;
    card.style.color = el.dataset.text;
  }
</script>
</body>
</html>
