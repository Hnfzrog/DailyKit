<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Habit Tracker — DailyKit</title>
  <!--
  ADSENSE: Uncomment after approval.
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
  -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #eff6ff; color: #1e293b; }
    p, h1, h2, h3 { margin: 0; }

    .ad-slot { width: 100%; padding: 0.4rem 0; background: rgba(0,0,0,0.03); }
    .ad-ph {
      max-width: 760px; margin: 0 auto; min-height: 80px;
      border: 1px dashed #bfdbfe; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .top-nav {
      background: #fff; border-bottom: 1px solid #dbeafe;
      padding: 0.7rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-link { color: #2563eb; font-weight: 600; font-size: 0.9rem; }
    .tool-title { font-weight: 700; }

    .wrap { max-width: 760px; margin: 1.5rem auto; padding: 0 1rem; }

    /* Date bar */
    .date-bar {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 14px; padding: 1rem 1.3rem;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.1rem; color: #fff;
    }
    .date-bar h2 { font-size: 1.05rem; }
    .date-bar p { font-size: 0.82rem; opacity: 0.8; margin-top: 0.15rem; }
    .today-pct { font-size: 1.6rem; font-weight: 800; }

    /* Add habit */
    .add-row {
      background: #fff; border: 1px solid #dbeafe; border-radius: 12px;
      padding: 0.85rem 1rem; margin-bottom: 1rem;
      display: flex; gap: 0.6rem; align-items: center;
    }
    .add-row input {
      flex: 1; border: 1px solid #dbeafe; border-radius: 8px;
      padding: 0.6rem 0.75rem; font: inherit; background: #f0f9ff;
    }
    .add-row input:focus { outline: none; border-color: #2563eb; background: #fff; }
    .add-row select {
      border: 1px solid #dbeafe; border-radius: 8px;
      padding: 0.6rem 0.5rem; font: inherit; background: #f0f9ff;
    }
    .add-row button {
      padding: 0.6rem 1rem; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font: inherit; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    .add-row button:hover { background: #1d4ed8; }
    @media (max-width: 520px) { .add-row { flex-wrap: wrap; } }

    /* Habit cards */
    .habits-list { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.2rem; }

    .habit-card {
      background: #fff; border: 1px solid #dbeafe; border-radius: 13px;
      overflow: hidden;
    }
    .habit-main {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 1rem;
    }
    .habit-check {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #bfdbfe; cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0; transition: background 0.2s, border-color 0.2s;
      font-size: 0.9rem; background: #eff6ff;
    }
    .habit-check.done { background: #2563eb; border-color: #2563eb; }
    .habit-info { flex: 1; }
    .habit-name { font-weight: 700; }
    .habit-name.done { color: #94a3b8; text-decoration: line-through; }
    .habit-meta { font-size: 0.75rem; color: #94a3b8; margin-top: 0.1rem; }
    .habit-streak {
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 999px; padding: 0.2rem 0.55rem;
      font-size: 0.75rem; font-weight: 700; color: #2563eb;
      white-space: nowrap;
    }
    .habit-streak.fire { background: #fff7ed; border-color: #fed7aa; color: #ea580c; }
    .del-habit { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 0.9rem; padding: 0.2rem 0.4rem; }
    .del-habit:hover { color: #f43f5e; }

    /* Weekly grid inside card */
    .week-row {
      display: grid; grid-template-columns: repeat(7, 1fr);
      border-top: 1px solid #eff6ff; padding: 0.4rem 0.8rem 0.55rem;
      gap: 0.2rem;
    }
    .week-day { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .wd-label { font-size: 0.55rem; color: #94a3b8; text-transform: uppercase; }
    .wd-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: #e2e8f0;
    }
    .wd-dot.filled { background: #2563eb; }
    .wd-dot.today { box-shadow: 0 0 0 2px #bfdbfe; }

    /* Summary stats */
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.65rem; margin-bottom: 1.2rem; }
    .stat-box {
      background: #fff; border: 1px solid #dbeafe; border-radius: 12px;
      padding: 0.8rem; text-align: center;
    }
    .stat-val { font-size: 1.5rem; font-weight: 800; color: #2563eb; }
    .stat-lbl { font-size: 0.72rem; color: #64748b; margin-top: 0.1rem; }

    .empty-msg { text-align: center; padding: 2.5rem 1rem; color: #94a3b8; }
  </style>
</head>
<body>

<div class="ad-slot">
  <!--
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
    data-ad-slot="SLOT_ID_1" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  -->
  <div class="ad-ph">Advertisement</div>
</div>

<nav class="top-nav">
  <a class="back-link" href="../index.html">← All Tools</a>
  <span class="tool-title">✅ Daily Habit Tracker</span>
  <span></span>
</nav>

<div class="wrap">

  <!-- Date + Progress -->
  <div class="date-bar">
    <div>
      <h2 id="todayLabel">Today</h2>
      <p id="todayDate">Loading...</p>
    </div>
    <div style="text-align:right">
      <div class="today-pct" id="todayPct">0%</div>
      <div style="font-size:0.78rem;opacity:0.8">done today</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Habits</div></div>
    <div class="stat-box"><div class="stat-val" id="statDone">0</div><div class="stat-lbl">Done Today</div></div>
    <div class="stat-box"><div class="stat-val" id="statBestStreak">0</div><div class="stat-lbl">🔥 Best Streak</div></div>
  </div>

  <!-- Add habit -->
  <div class="add-row">
    <input type="text" id="newHabit" placeholder="New habit, e.g. Drink 8 glasses of water" />
    <select id="newEmoji">
      <option value="💧">💧 Water</option>
      <option value="🏃">🏃 Exercise</option>
      <option value="📚">📚 Reading</option>
      <option value="🧘">🧘 Meditation</option>
      <option value="🥗">🥗 Healthy Eat</option>
      <option value="😴">😴 Sleep Early</option>
      <option value="📝">📝 Journal</option>
      <option value="🎯">🎯 Goal</option>
    </select>
    <button onclick="addHabit()">+ Add</button>
  </div>

  <!-- Habits -->
  <div class="habits-list" id="habitList"></div>

  <div class="ad-slot" style="margin-bottom:2rem">
    <!--
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
      data-ad-slot="SLOT_ID_2" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    <div class="ad-ph">Advertisement</div>
  </div>
</div>

<script>
  const KEY = 'dk_habits';
  const today = new Date().toISOString().split('T')[0];
  const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAY_NAMES  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  let habits = JSON.parse(localStorage.getItem(KEY) || '[]');

  function getWeekDates() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      days.push(d.toISOString().split('T')[0]);
    }
    return days;
  }

  function save() { localStorage.setItem(KEY, JSON.stringify(habits)); }

  function getStreak(h) {
    let streak = 0;
    let d = new Date();
    while (true) {
      const ds = d.toISOString().split('T')[0];
      if (!h.log[ds]) break;
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  function toggleToday(id) {
    const h = habits.find(x => x.id === id);
    if (!h) return;
    if (!h.log) h.log = {};
    h.log[today] = !h.log[today];
    save(); render();
  }

  function delHabit(id) {
    habits = habits.filter(h => h.id !== id);
    save(); render();
  }

  function addHabit() {
    const name = document.getElementById('newHabit').value.trim();
    if (!name) { alert('Enter a habit name.'); return; }
    habits.push({ id: Date.now(), name, emoji: document.getElementById('newEmoji').value, log: {} });
    document.getElementById('newHabit').value = '';
    save(); render();
  }

  function render() {
    const week = getWeekDates();
    const done = habits.filter(h => h.log && h.log[today]).length;
    const pct  = habits.length ? Math.round(done / habits.length * 100) : 0;
    const best = habits.reduce((m, h) => Math.max(m, getStreak(h)), 0);

    document.getElementById('todayPct').textContent      = pct + '%';
    document.getElementById('statTotal').textContent     = habits.length;
    document.getElementById('statDone').textContent      = done;
    document.getElementById('statBestStreak').textContent = best;

    const d = new Date();
    document.getElementById('todayLabel').textContent = DAY_NAMES[d.getDay()];
    document.getElementById('todayDate').textContent  = d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });

    const list = document.getElementById('habitList');
    if (!habits.length) {
      list.innerHTML = '<div class="empty-msg">No habits yet. Add your first habit above.</div>';
      return;
    }

    list.innerHTML = habits.map(h => {
      const isDone = h.log && h.log[today];
      const streak = getStreak(h);
      return `
        <div class="habit-card">
          <div class="habit-main">
            <div class="habit-check ${isDone ? 'done' : ''}" onclick="toggleToday(${h.id})">${isDone ? '✓' : ''}</div>
            <div class="habit-info">
              <div class="habit-name ${isDone ? 'done' : ''}">${h.emoji} ${h.name}</div>
              <div class="habit-meta">${streak > 0 ? streak + '-day streak' : 'No streak yet'}</div>
            </div>
            <span class="habit-streak ${streak >= 7 ? 'fire' : ''}">${streak >= 7 ? '🔥' : '⚡'} ${streak}d</span>
            <button class="del-habit" onclick="delHabit(${h.id})" title="Remove habit">✕</button>
          </div>
          <div class="week-row">
            ${week.map(date => {
              const dt    = new Date(date + 'T00:00:00');
              const isT   = date === today;
              const done_ = h.log && h.log[date];
              return `<div class="week-day">
                <span class="wd-label">${DAY_LABELS[dt.getDay()]}</span>
                <div class="wd-dot ${done_ ? 'filled' : ''} ${isT ? 'today' : ''}"></div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('newHabit').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });
  render();
</script>
</body>
</html>
