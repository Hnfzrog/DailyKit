<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator — DailyKit</title>
  <!--
  ADSENSE: Uncomment after approval.
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
  -->
  <!-- QR Code library from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff7ed; color: #1e293b; }
    p, h1, h2 { margin: 0; }

    .ad-slot { width: 100%; padding: 0.4rem 0; background: rgba(0,0,0,0.03); }
    .ad-ph {
      max-width: 760px; margin: 0 auto; min-height: 80px;
      border: 1px dashed #fed7aa; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .top-nav {
      background: #fff; border-bottom: 1px solid #ffedd5;
      padding: 0.7rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-link { color: #ea580c; font-weight: 600; font-size: 0.9rem; }
    .tool-title { font-weight: 700; }

    .wrap { max-width: 760px; margin: 1.5rem auto; padding: 0 1rem; }

    .card { background: #fff; border: 1px solid #ffedd5; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem; }
    .card h2 { font-size: 1rem; margin-bottom: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.85rem; }
    .field label { font-size: 0.82rem; font-weight: 600; color: #64748b; }
    .field textarea {
      border: 1px solid #fed7aa; border-radius: 8px;
      padding: 0.7rem; font: inherit; resize: vertical; min-height: 80px;
      background: #fff7ed;
    }
    .field textarea:focus { outline: none; border-color: #ea580c; background: #fff; }
    .field input[type="color"] { width: 48px; height: 36px; border: 1px solid #fed7aa; border-radius: 6px; cursor: pointer; padding: 0.2rem; }

    .options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 540px) { .options { grid-template-columns: 1fr 1fr; } }
    .opt-field { display: flex; flex-direction: column; gap: 0.3rem; }
    .opt-field label { font-size: 0.78rem; font-weight: 600; color: #64748b; }
    .opt-field select { border: 1px solid #fed7aa; border-radius: 7px; padding: 0.5rem 0.6rem; font: inherit; background: #fff7ed; }
    .opt-field select:focus { outline: none; border-color: #ea580c; }

    .gen-btn {
      width: 100%; padding: 0.8rem;
      background: #ea580c; color: #fff;
      border: none; border-radius: 10px; font: inherit; font-weight: 700;
      font-size: 0.95rem; cursor: pointer; transition: background 0.2s;
    }
    .gen-btn:hover { background: #c2410c; }

    /* Output */
    .output { display: none; }
    .qr-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 1.2rem; padding: 1.5rem;
    }
    #qrDisplay { border-radius: 12px; overflow: hidden; }
    #qrDisplay canvas, #qrDisplay img { display: block; }
    .qr-actions { display: flex; gap: 0.65rem; flex-wrap: wrap; justify-content: center; }
    .btn-dl { padding: 0.65rem 1.4rem; background: #ea580c; color: #fff; border: none; border-radius: 9px; font: inherit; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .btn-dl:hover { background: #c2410c; }
    .btn-copy { padding: 0.65rem 1.2rem; background: #fff; color: #334155; border: 1px solid #fed7aa; border-radius: 9px; font: inherit; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .btn-copy:hover { background: #fff7ed; }
    .qr-text { font-size: 0.8rem; color: #94a3b8; word-break: break-all; max-width: 280px; text-align: center; }
    .qr-history { margin-top: 1rem; }
    .qr-history h3 { font-size: 0.85rem; color: #64748b; margin-bottom: 0.65rem; }
    .history-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .history-chip {
      background: #fff7ed; border: 1px solid #fed7aa; border-radius: 6px;
      padding: 0.3rem 0.65rem; font-size: 0.78rem; cursor: pointer; color: #9a3412;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .history-chip:hover { background: #ffedd5; }
  </style>
</head>
<body>

<div class="ad-slot">
  <!--
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
    data-ad-slot="SLOT_ID_1" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  -->
  <div class="ad-ph">Advertisement</div>
</div>

<nav class="top-nav">
  <a class="back-link" href="../index.html">← All Tools</a>
  <span class="tool-title">📱 QR Code Generator</span>
  <span></span>
</nav>

<div class="wrap">

  <div class="card">
    <h2>Enter Your Content</h2>
    <div class="field">
      <label>URL, text, phone number, or any content</label>
      <textarea id="qrText" placeholder="https://your-website.com &#10;or any text..."></textarea>
    </div>
    <div class="options">
      <div class="opt-field">
        <label>Size</label>
        <select id="qrSize">
          <option value="128">Small (128px)</option>
          <option value="200" selected>Medium (200px)</option>
          <option value="280">Large (280px)</option>
          <option value="400">Extra Large (400px)</option>
        </select>
      </div>
      <div class="opt-field">
        <label>Error Correction</label>
        <select id="qrEcc">
          <option value="L">Low (L)</option>
          <option value="M" selected>Medium (M)</option>
          <option value="Q">High (Q)</option>
          <option value="H">Best (H)</option>
        </select>
      </div>
      <div class="opt-field">
        <label>Dark Color</label>
        <input type="color" id="qrDark" value="#000000" />
      </div>
      <div class="opt-field">
        <label>Light Color</label>
        <input type="color" id="qrLight" value="#ffffff" />
      </div>
    </div>
    <button class="gen-btn" onclick="generateQR()">📱 Generate QR Code</button>
  </div>

  <div class="card output" id="outputCard">
    <div class="qr-wrap">
      <div id="qrDisplay"></div>
      <div class="qr-text" id="qrLabel"></div>
      <div class="qr-actions">
        <button class="btn-dl" onclick="downloadQR()">⬇ Download PNG</button>
        <button class="btn-copy" onclick="copyText()">📋 Copy Text</button>
      </div>
    </div>
  </div>

  <div class="card qr-history" id="historyCard" style="display:none">
    <h3>Recent Codes</h3>
    <div class="history-list" id="historyList"></div>
  </div>

  <div class="ad-slot" style="margin-bottom:2rem">
    <!--
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
      data-ad-slot="SLOT_ID_2" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    <div class="ad-ph">Advertisement</div>
  </div>
</div>

<script>
  const HIST_KEY = 'dk_qr_history';
  let history_ = JSON.parse(localStorage.getItem(HIST_KEY) || '[]');

  const eccMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };

  function generateQR() {
    const text = document.getElementById('qrText').value.trim();
    if (!text) { alert('Please enter some content.'); return; }

    const size  = parseInt(document.getElementById('qrSize').value);
    const dark  = document.getElementById('qrDark').value;
    const light = document.getElementById('qrLight').value;
    const ecc   = document.getElementById('qrEcc').value;

    const display = document.getElementById('qrDisplay');
    display.innerHTML = '';

    new QRCode(display, {
      text,
      width: size, height: size,
      colorDark: dark, colorLight: light,
      correctLevel: eccMap[ecc],
    });

    document.getElementById('qrLabel').textContent = text.length > 60 ? text.slice(0, 57) + '…' : text;
    document.getElementById('outputCard').style.display = 'block';
    document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

    // save history
    if (!history_.includes(text)) {
      history_.unshift(text);
      if (history_.length > 8) history_.pop();
      localStorage.setItem(HIST_KEY, JSON.stringify(history_));
      renderHistory();
    }
  }

  function downloadQR() {
    const canvas = document.querySelector('#qrDisplay canvas');
    if (!canvas) { alert('Generate a QR code first.'); return; }
    const a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }

  function copyText() {
    const text = document.getElementById('qrText').value.trim();
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = '✓ Copied!';
      setTimeout(() => { btn.textContent = '📋 Copy Text'; }, 1500);
    });
  }

  function renderHistory() {
    if (!history_.length) return;
    document.getElementById('historyCard').style.display = 'block';
    document.getElementById('historyList').innerHTML = history_.map(h =>
      `<div class="history-chip" onclick="document.getElementById('qrText').value='${h.replace(/'/g, "\\'")}'; generateQR();" title="${h}">${h}</div>`
    ).join('');
  }

  renderHistory();
</script>
</body>
</html>
