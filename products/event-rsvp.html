<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event RSVP Page — DailyKit</title>
  <!--
  ADSENSE: Uncomment after approval.
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
  -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0fdf4; color: #1e293b; }
    p, h1, h2, h3 { margin: 0; }

    .ad-slot { width: 100%; padding: 0.4rem 0; background: rgba(0,0,0,0.03); }
    .ad-ph {
      max-width: 960px; margin: 0 auto; min-height: 80px;
      border: 1px dashed #bbf7d0; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .top-nav {
      background: #fff; border-bottom: 1px solid #dcfce7;
      padding: 0.7rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-link { color: #16a34a; font-weight: 600; font-size: 0.9rem; }
    .tool-title { font-weight: 700; }

    .wrap { max-width: 960px; margin: 1.5rem auto; padding: 0 1rem; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 1.2rem; background: #fff; border: 1px solid #dcfce7; border-radius: 12px; overflow: hidden; }
    .tab {
      flex: 1; padding: 0.8rem; text-align: center;
      font-weight: 700; font-size: 0.9rem; cursor: pointer; color: #64748b;
      border: none; background: none; transition: background 0.2s, color 0.2s;
    }
    .tab.active { background: #16a34a; color: #fff; }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    .card { background: #fff; border: 1px solid #dcfce7; border-radius: 14px; padding: 1.3rem; margin-bottom: 1.1rem; }
    .card h2 { font-size: 1rem; margin-bottom: 1rem; color: #15803d; }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    @media (max-width: 580px) { .fields { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field.full { grid-column: 1 / -1; }
    .field label { font-size: 0.8rem; font-weight: 600; color: #475569; }
    .field input, .field select, .field textarea {
      border: 1px solid #d1fae5; border-radius: 8px;
      padding: 0.6rem 0.75rem; font: inherit; background: #f0fdf4;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: #16a34a; background: #fff;
    }
    .field textarea { resize: vertical; min-height: 70px; }
    .btn-green {
      width: 100%; padding: 0.78rem; background: #16a34a; color: #fff;
      border: none; border-radius: 10px; font: inherit; font-weight: 700;
      font-size: 0.95rem; cursor: pointer;
    }
    .btn-green:hover { background: #15803d; }

    /* Event display */
    .event-banner {
      background: linear-gradient(135deg, #16a34a, #065f46);
      color: #fff; border-radius: 14px; padding: 1.5rem;
      margin-bottom: 1.1rem;
    }
    .event-banner h3 { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .event-meta { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 0.5rem; }
    .event-meta span { font-size: 0.88rem; opacity: 0.9; }
    .event-desc { margin-top: 0.75rem; opacity: 0.85; font-size: 0.9rem; line-height: 1.6; }

    /* RSVP Summary */
    .rsvp-summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.7rem; margin-bottom: 1.1rem;
    }
    @media (max-width: 480px) { .rsvp-summary { grid-template-columns: 1fr; } }
    .sum-box { background: #fff; border: 1px solid #dcfce7; border-radius: 12px; padding: 0.8rem; text-align: center; }
    .sum-num { font-size: 1.6rem; font-weight: 800; }
    .sum-lbl { font-size: 0.75rem; color: #64748b; }
    .attending .sum-num { color: #16a34a; }
    .notAttending .sum-num { color: #f43f5e; }
    .pending .sum-num { color: #f59e0b; }

    /* Guest list */
    .guest-list { list-style: none; padding: 0; }
    .guest-item {
      display: grid; grid-template-columns: 2fr 1fr 1fr auto;
      gap: 0.5rem; align-items: center;
      padding: 0.7rem 1.2rem; border-bottom: 1px solid #f0fdf4;
      font-size: 0.88rem;
    }
    .guest-item:last-child { border-bottom: none; }
    .g-name { font-weight: 600; }
    .g-status { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 700; width: fit-content; }
    .s-yes { background: #dcfce7; color: #15803d; }
    .s-no  { background: #fee2e2; color: #b91c1c; }
    .s-maybe { background: #fef9c3; color: #a16207; }
    .g-count { color: #64748b; text-align: center; }
    .del-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 0.9rem; }
    .del-btn:hover { color: #f43f5e; }
    .empty-msg { padding: 1.5rem; text-align: center; color: #94a3b8; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="ad-slot">
  <!--
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
    data-ad-slot="SLOT_ID_1" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  -->
  <div class="ad-ph">Advertisement</div>
</div>

<nav class="top-nav">
  <a class="back-link" href="../index.html">← All Tools</a>
  <span class="tool-title">📋 Event RSVP Page</span>
  <span></span>
</nav>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('setup', this)">⚙ Setup Event</button>
    <button class="tab" onclick="switchTab('rsvp', this)">📬 RSVP Form</button>
    <button class="tab" onclick="switchTab('guests', this)">👥 Guest List</button>
  </div>

  <!-- SETUP TAB -->
  <div class="panel active" id="panel-setup">
    <div class="card">
      <h2>Create Your Event</h2>
      <div class="fields">
        <div class="field full"><label>Event Name</label><input type="text" id="evName" placeholder="Annual Family Gathering 2026" /></div>
        <div class="field"><label>Date</label><input type="date" id="evDate" /></div>
        <div class="field"><label>Time</label><input type="time" id="evTime" /></div>
        <div class="field full"><label>Location / Venue</label><input type="text" id="evVenue" placeholder="Aula RT 05, Jl. Kenanga No. 3" /></div>
        <div class="field full"><label>Description</label><textarea id="evDesc" placeholder="Dress code: batik. Bring your family!"></textarea></div>
        <div class="field"><label>Host Name</label><input type="text" id="evHost" placeholder="Pak Rahmat" /></div>
        <div class="field"><label>Contact (WhatsApp)</label><input type="text" id="evContact" placeholder="+62 812-0000-0000" /></div>
      </div>
    </div>
    <button class="btn-green" onclick="saveEvent()">✓ Save Event &amp; Open RSVP Form</button>
  </div>

  <!-- RSVP TAB -->
  <div class="panel" id="panel-rsvp">
    <div id="evBanner" style="display:none"></div>
    <div class="card">
      <h2>Submit Your RSVP</h2>
      <div class="fields">
        <div class="field full"><label>Your Full Name</label><input type="text" id="rName" placeholder="Budi Santoso" /></div>
        <div class="field"><label>Phone / WhatsApp</label><input type="tel" id="rPhone" placeholder="+62 812-xxxx" /></div>
        <div class="field">
          <label>Attendance</label>
          <select id="rStatus">
            <option value="yes">✅ Yes, I'll attend</option>
            <option value="maybe">🤔 Maybe</option>
            <option value="no">❌ Can't make it</option>
          </select>
        </div>
        <div class="field"><label>Number of Guests (including you)</label><input type="number" id="rGuests" value="1" min="1" max="20" /></div>
        <div class="field full"><label>Note (optional)</label><input type="text" id="rNote" placeholder="Dietary restriction, etc." /></div>
      </div>
    </div>
    <button class="btn-green" onclick="submitRsvp()">📬 Submit RSVP</button>
    <div id="rsvpMsg" style="margin-top:0.75rem; text-align:center; font-weight:700; color:#16a34a; min-height:1.5rem;"></div>
  </div>

  <!-- GUESTS TAB -->
  <div class="panel" id="panel-guests">
    <div id="evBanner2" style="display:none"></div>
    <div class="rsvp-summary">
      <div class="sum-box attending"><div class="sum-num" id="cntYes">0</div><div class="sum-lbl">Attending</div></div>
      <div class="sum-box notAttending"><div class="sum-num" id="cntNo">0</div><div class="sum-lbl">Not Coming</div></div>
      <div class="sum-box pending"><div class="sum-num" id="cntMaybe">0</div><div class="sum-lbl">Maybe</div></div>
    </div>
    <div class="card" style="padding:0;">
      <ul class="guest-list" id="guestList"></ul>
    </div>
    <button class="btn-green" style="margin-top:0.6rem; background:#f43f5e;" onclick="clearGuests()">🗑 Clear All RSVPs</button>
  </div>

  <div class="ad-slot" style="margin: 1rem 0 2rem">
    <!--
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
      data-ad-slot="SLOT_ID_2" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    <div class="ad-ph">Advertisement</div>
  </div>
</div>

<script>
  const EV_KEY = 'dk_event', GU_KEY = 'dk_guests';
  let event_ = JSON.parse(localStorage.getItem(EV_KEY) || 'null');
  let guests = JSON.parse(localStorage.getItem(GU_KEY) || '[]');

  function switchTab(id, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    btn.classList.add('active');
    if (id === 'rsvp')   renderEventBanner('evBanner');
    if (id === 'guests') { renderEventBanner('evBanner2'); renderGuests(); }
  }

  function fmtDate(d, t) {
    if (!d) return '';
    const obj = new Date(d + 'T00:00:00');
    let s = obj.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    if (t) { const [h,m] = t.split(':'); const hr = parseInt(h); s += ', ' + (hr > 12 ? hr-12 : hr||12) + ':' + m + (hr >= 12 ? ' PM' : ' AM'); }
    return s;
  }

  function renderEventBanner(elId) {
    const el = document.getElementById(elId);
    if (!event_) { el.style.display='none'; return; }
    el.style.display = 'block';
    el.innerHTML = `<div class="event-banner">
      <h3>${event_.name}</h3>
      <div class="event-meta">
        <span>📅 ${fmtDate(event_.date, event_.time)}</span>
        <span>📍 ${event_.venue}</span>
        ${event_.host ? '<span>👤 Host: '+event_.host+'</span>' : ''}
        ${event_.contact ? '<span>📞 '+event_.contact+'</span>' : ''}
      </div>
      ${event_.desc ? '<p class="event-desc">' + event_.desc + '</p>' : ''}
    </div>`;
  }

  function saveEvent() {
    const name    = document.getElementById('evName').value.trim();
    if (!name) { alert('Enter an event name.'); return; }
    event_ = {
      name, date: document.getElementById('evDate').value,
      time: document.getElementById('evTime').value,
      venue: document.getElementById('evVenue').value,
      desc: document.getElementById('evDesc').value,
      host: document.getElementById('evHost').value,
      contact: document.getElementById('evContact').value,
    };
    localStorage.setItem(EV_KEY, JSON.stringify(event_));
    switchTab('rsvp', document.querySelectorAll('.tab')[1]);
  }

  function submitRsvp() {
    const name = document.getElementById('rName').value.trim();
    if (!name) { alert('Enter your name.'); return; }
    guests.unshift({
      id: Date.now(),
      name,
      phone: document.getElementById('rPhone').value,
      status: document.getElementById('rStatus').value,
      guests: parseInt(document.getElementById('rGuests').value) || 1,
      note: document.getElementById('rNote').value,
    });
    localStorage.setItem(GU_KEY, JSON.stringify(guests));
    document.getElementById('rsvpMsg').textContent = '✅ RSVP submitted! Thank you, ' + name + '.';
    document.getElementById('rName').value = '';
    document.getElementById('rPhone').value = '';
    document.getElementById('rNote').value = '';
    document.getElementById('rGuests').value = '1';
  }

  function renderGuests() {
    const yes = guests.filter(g => g.status==='yes').length;
    const no  = guests.filter(g => g.status==='no').length;
    const may = guests.filter(g => g.status==='maybe').length;
    document.getElementById('cntYes').textContent   = yes;
    document.getElementById('cntNo').textContent    = no;
    document.getElementById('cntMaybe').textContent = may;
    const list = document.getElementById('guestList');
    if (!guests.length) { list.innerHTML = '<li class="empty-msg">No RSVPs yet. Share the RSVP Form tab with guests.</li>'; return; }
    const labels = { yes:'Yes', no:'No', maybe:'Maybe' };
    const cls    = { yes:'s-yes', no:'s-no', maybe:'s-maybe' };
    list.innerHTML = guests.map(g => `<li class="guest-item">
      <span class="g-name">${g.name} ${g.note ? '<span style="color:#94a3b8;font-size:0.78rem">(${g.note})</span>' : ''}</span>
      <span class="g-status ${cls[g.status]}">${labels[g.status]}</span>
      <span class="g-count">${g.guests} guest${g.guests>1?'s':''}</span>
      <button class="del-btn" onclick="delGuest(${g.id})">✕</button>
    </li>`).join('');
  }

  function delGuest(id) { guests = guests.filter(g => g.id !== id); localStorage.setItem(GU_KEY, JSON.stringify(guests)); renderGuests(); }
  function clearGuests() { if (confirm('Delete all RSVPs?')) { guests = []; localStorage.setItem(GU_KEY, '[]'); renderGuests(); } }

  // init
  if (event_) {
    document.getElementById('evName').value  = event_.name;
    document.getElementById('evDate').value  = event_.date;
    document.getElementById('evTime').value  = event_.time;
    document.getElementById('evVenue').value = event_.venue;
    document.getElementById('evDesc').value  = event_.desc;
    document.getElementById('evHost').value  = event_.host;
    document.getElementById('evContact').value = event_.contact;
  }
</script>
</body>
</html>
