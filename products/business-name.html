<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Name Generator — DailyKit</title>
  <!--
  ADSENSE: Uncomment after approval.
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
  -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafaf0; color: #1e293b; }
    p, h1, h2, h3 { margin: 0; }

    .ad-slot { width: 100%; padding: 0.4rem 0; background: rgba(0,0,0,0.03); }
    .ad-ph {
      max-width: 800px; margin: 0 auto; min-height: 80px;
      border: 1px dashed #fde68a; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .top-nav {
      background: #fff; border-bottom: 1px solid #fef9c3;
      padding: 0.7rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-link { color: #ca8a04; font-weight: 600; font-size: 0.9rem; }
    .tool-title { font-weight: 700; }

    .wrap { max-width: 800px; margin: 1.5rem auto; padding: 0 1rem; }

    .card { background: #fff; border: 1px solid #fef9c3; border-radius: 16px; padding: 1.4rem; margin-bottom: 1.2rem; }
    .card h2 { font-size: 1.05rem; margin-bottom: 1rem; }

    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
    @media (max-width: 560px) { .fields { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field.full { grid-column: 1 / -1; }
    .field label { font-size: 0.8rem; font-weight: 600; color: #78716c; }
    .field input, .field select {
      border: 1px solid #fde68a; border-radius: 8px;
      padding: 0.65rem 0.75rem; font: inherit; background: #fafaf0;
    }
    .field input:focus, .field select:focus { outline: none; border-color: #ca8a04; background: #fff; }

    /* Style chips */
    .style-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.3rem; }
    .style-chip {
      padding: 0.3rem 0.75rem; border-radius: 999px;
      border: 1px solid #fde68a; background: #fffbeb;
      font-size: 0.8rem; font-weight: 600; cursor: pointer; color: #92400e;
      transition: background 0.15s, border-color 0.15s;
    }
    .style-chip.active { background: #f59e0b; border-color: #f59e0b; color: #fff; }

    .gen-btn {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff; border: none; border-radius: 10px;
      font: inherit; font-weight: 800; font-size: 1rem;
      cursor: pointer; letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(245,158,11,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.45); }
    .gen-btn:active { transform: translateY(0); }

    /* Results */
    #results { display: none; }
    .results-head {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.85rem;
    }
    .results-head h2 { font-size: 1.05rem; }
    .regen-btn {
      padding: 0.4rem 0.85rem; background: #fff; color: #ca8a04;
      border: 1px solid #fde68a; border-radius: 8px; font: inherit;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
    }
    .regen-btn:hover { background: #fffbeb; }
    .names-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.6rem; }
    .name-item {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
      padding: 0.65rem 0.85rem;
      display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
    }
    .name-text { font-weight: 700; font-size: 0.95rem; }
    .name-style { font-size: 0.7rem; color: #a16207; }
    .copy-btn {
      background: none; border: none; color: #d97706; cursor: pointer;
      font-size: 0.8rem; padding: 0.25rem 0.5rem; border-radius: 5px;
      font-weight: 700; white-space: nowrap;
    }
    .copy-btn:hover { background: #fef3c7; }
    .copy-btn.copied { color: #16a34a; }

    /* Saved names */
    .saved-section { margin-top: 1.2rem; }
    .saved-section h3 { font-size: 0.88rem; color: #78716c; margin-bottom: 0.5rem; }
    .saved-names { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .saved-chip {
      background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px;
      padding: 0.3rem 0.7rem; font-size: 0.82rem; font-weight: 700; color: #92400e;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .saved-chip button { background: none; border: none; color: #d4a96a; cursor: pointer; font-size: 0.7rem; }
  </style>
</head>
<body>

<div class="ad-slot">
  <!--
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
    data-ad-slot="SLOT_ID_1" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  -->
  <div class="ad-ph">Advertisement</div>
</div>

<nav class="top-nav">
  <a class="back-link" href="../index.html">← All Tools</a>
  <span class="tool-title">💡 Business Name Generator</span>
  <span></span>
</nav>

<div class="wrap">

  <div class="card">
    <h2>Tell us about your business</h2>
    <div class="fields">
      <div class="field">
        <label>Industry / Niche</label>
        <select id="industry">
          <option>Food & Beverage</option>
          <option>Beauty & Salon</option>
          <option>Technology</option>
          <option>Education & Tutoring</option>
          <option>Fashion & Clothing</option>
          <option>Health & Wellness</option>
          <option>Home Services</option>
          <option>Photography</option>
          <option>Consulting</option>
          <option>E-Commerce / Retail</option>
          <option>Finance</option>
          <option>Travel & Tourism</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>1-3 Keywords (comma separated)</label>
        <input type="text" id="keywords" placeholder="fresh, homemade, artisan" />
      </div>
      <div class="field full">
        <label>Name Style</label>
        <div class="style-chips" id="styleChips">
          <div class="style-chip active" data-style="modern">Modern</div>
          <div class="style-chip active" data-style="friendly">Friendly</div>
          <div class="style-chip" data-style="premium">Premium</div>
          <div class="style-chip" data-style="playful">Playful</div>
          <div class="style-chip" data-style="local">Local / Indonesian</div>
          <div class="style-chip" data-style="acronym">Acronym / Short</div>
          <div class="style-chip" data-style="compound">Compound Word</div>
        </div>
      </div>
    </div>
  </div>

  <button class="gen-btn" onclick="generate()">💡 Generate 20 Business Names</button>

  <!-- RESULTS -->
  <div class="card" id="results" style="margin-top:1.2rem">
    <div class="results-head">
      <h2>Generated Names</h2>
      <button class="regen-btn" onclick="generate()">↻ Regenerate</button>
    </div>
    <div class="names-grid" id="namesGrid"></div>
    <div class="saved-section" id="savedSection" style="display:none">
      <h3>⭐ Saved Names</h3>
      <div class="saved-names" id="savedNames"></div>
    </div>
  </div>

  <div class="ad-slot" style="margin-bottom:2rem">
    <!--
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
      data-ad-slot="SLOT_ID_2" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    <div class="ad-ph">Advertisement</div>
  </div>
</div>

<script>
  const SAVED_KEY = 'dk_saved_names';
  let saved = JSON.parse(localStorage.getItem(SAVED_KEY) || '[]');

  // Style chips toggle
  document.getElementById('styleChips').addEventListener('click', e => {
    const chip = e.target.closest('.style-chip');
    if (chip) chip.classList.toggle('active');
  });

  // Word banks
  const PREFIXES = ['Nova','Zen','Prime','Spark','Arc','Apex','Echo','Flux','Lumi','Peak','Core','Rise','Swift','Bold','Pure','Bloom','Craft','Nest','Forge','Glow'];
  const SUFFIXES = ['Hub','Lab','Co','Works','Studio','Group','Plus','Pro','Zone','Base','House','Shop','Space','Link','Flow','Box','Point','Line','Spot','Desk'];
  const VERBS    = ['Build','Craft','Create','Grow','Make','Serve','Connect','Shape','Fuel','Drive'];
  const ADJ_MOD  = ['Smart','Fresh','Fast','Easy','Clear','Good','Real','True','First','Best'];

  const INDUSTRY_WORDS = {
    'Food & Beverage':    ['Kitchen','Plate','Bites','Chef','Table','Bowl','Spice','Broth','Feast','Brew'],
    'Beauty & Salon':     ['Glow','Bloom','Lash','Shine','Radiant','Petal','Silk','Luxe','Flair','Vibe'],
    'Technology':         ['Tech','Dev','Code','Net','Bit','Digital','Sys','Cloud','Logic','Stack'],
    'Education & Tutoring':['Learn','Academy','Edu','School','Tutor','Class','Mind','Bright','Skill','Study'],
    'Fashion & Clothing': ['Style','Wear','Cloth','Thread','Stitch','Look','Mode','Trend','Fit','Drape'],
    'Health & Wellness':  ['Vital','Heal','Fit','Well','Balance','Thrive','Care','Body','Calm','Lift'],
    'Home Services':      ['Home','Fix','Care','Clean','Build','Repair','Guard','Fresh','Safe','Nest'],
    'Photography':        ['Frame','Lens','Click','View','Shot','Flash','Scene','Capture','Focus','Light'],
    'Consulting':         ['Consult','Advise','Strategy','Insight','Guide','Mentor','Vision','Plan','Edge','Wise'],
    'E-Commerce / Retail':['Shop','Market','Store','Cart','Deal','Pick','Select','Goods','Trade','Sell'],
    'Finance':            ['Capital','Fund','Wealth','Asset','Invest','Grow','Pay','Cash','Vault','Trust'],
    'Travel & Tourism':   ['Journey','Trip','Wander','Explore','Route','Path','Destination','Adventure','Guide','Tour'],
    'Other':              ['Pro','Plus','Works','Hub','Lab','Co','Group','Studio','Space','Line'],
  };

  const LOCAL_WORDS  = ['Nusa','Raya','Prima','Maju','Jaya','Karya','Utama','Mandiri','Niaga','Cipta'];
  const INDONESIAN   = ['Sejahtera','Berkah','Makmur','Andalan','Terpercaya','Cemerlang','Unggul','Terbaik','Mulia','Abadi'];

  function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function cap(s)    { return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase(); }

  function getActiveStyles() {
    return [...document.querySelectorAll('.style-chip.active')].map(c => c.dataset.style);
  }

  function makeNames(industry, keywords, styles) {
    const industryW = INDUSTRY_WORDS[industry] || INDUSTRY_WORDS['Other'];
    const kwArr     = keywords.split(',').map(k => k.trim()).filter(Boolean).map(cap);
    const results   = new Set();

    function add(n) { if (n && n.length >= 4 && n.length <= 20) results.add(n); }

    const iters = 60;
    for (let i = 0; i < iters && results.size < 22; i++) {
      const style = styles.length ? styles[i % styles.length] : 'modern';
      const iw    = rand(industryW);
      const kw    = kwArr.length ? rand(kwArr) : rand(ADJ_MOD);

      if (style === 'modern') {
        add(rand(PREFIXES) + iw);
        add(kw + rand(SUFFIXES));
        add(rand(PREFIXES) + rand(SUFFIXES));
      }
      if (style === 'friendly') {
        add(kw + 'ly');
        add(kw + 'ify');
        add('The ' + kw + ' ' + iw);
        add(iw + 'ify');
      }
      if (style === 'premium') {
        add(rand(ADJ_MOD) + ' ' + iw + ' Co');
        add(kw + ' Luxe');
        add(rand(ADJ_MOD) + 'Premium');
        add('Le ' + kw + ' ' + iw);
      }
      if (style === 'playful') {
        add(kw + rand(VERBS));
        add(rand(VERBS) + kw);
        add(kw + '!' + ' ' + iw);
        add(cap(rand(VERBS)) + iw);
      }
      if (style === 'local') {
        add(rand(LOCAL_WORDS) + ' ' + iw);
        add(kw + ' ' + rand(INDONESIAN));
        add(rand(LOCAL_WORDS) + kw);
        add(iw + ' ' + rand(INDONESIAN));
      }
      if (style === 'acronym') {
        const combo = kw + iw;
        const acr   = combo.match(/[A-Z]/g);
        if (acr && acr.length >= 2) add(acr.slice(0,4).join('') + '!');
        add(kw.slice(0,3).toUpperCase() + rand(['X','Z','Q','Y']));
        add(kw.slice(0,2).toUpperCase() + iw.slice(0,2).toUpperCase());
      }
      if (style === 'compound') {
        add(kw + iw);
        add(iw + kw);
        add(rand(ADJ_MOD) + iw);
        add(kw + rand(SUFFIXES).toLowerCase());
      }
    }

    return [...results].slice(0, 20);
  }

  function generate() {
    const industry = document.getElementById('industry').value;
    const keywords = document.getElementById('keywords').value;
    const styles   = getActiveStyles();
    if (!styles.length) { alert('Select at least one name style.'); return; }

    const names = makeNames(industry, keywords, styles);
    const grid  = document.getElementById('namesGrid');
    grid.innerHTML = names.map((name, i) => {
      const style = styles[i % styles.length];
      return `<div class="name-item">
        <div>
          <div class="name-text">${name}</div>
          <div class="name-style">${style}</div>
        </div>
        <div style="display:flex;gap:0.3rem;flex-shrink:0">
          <button class="copy-btn" onclick="copyName(this, '${name.replace(/'/g,"\\'")}')">Copy</button>
          <button class="copy-btn" onclick="saveName('${name.replace(/'/g,"\\'")}')">⭐</button>
        </div>
      </div>`;
    }).join('');

    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    renderSaved();
  }

  function copyName(btn, name) {
    navigator.clipboard.writeText(name).then(() => {
      const orig = btn.textContent;
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1300);
    });
  }

  function saveName(name) {
    if (!saved.includes(name)) {
      saved.push(name);
      localStorage.setItem(SAVED_KEY, JSON.stringify(saved));
      renderSaved();
    }
  }

  function removeSaved(name) {
    saved = saved.filter(n => n !== name);
    localStorage.setItem(SAVED_KEY, JSON.stringify(saved));
    renderSaved();
  }

  function renderSaved() {
    const sec = document.getElementById('savedSection');
    if (!saved.length) { sec.style.display = 'none'; return; }
    sec.style.display = 'block';
    document.getElementById('savedNames').innerHTML = saved.map(n =>
      `<div class="saved-chip">${n}<button onclick="removeSaved('${n.replace(/'/g,"\\'")}')">✕</button></div>`
    ).join('');
  }

  renderSaved();
</script>
</body>
</html>
