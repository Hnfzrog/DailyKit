<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Contract Generator — DailyKit</title>
  <!--
  ADSENSE: Uncomment after approval.
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
  -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; }

    .ad-slot { width: 100%; padding: 0.4rem 0; background: rgba(0,0,0,0.03); }
    .ad-ph {
      max-width: 960px; margin: 0 auto; min-height: 80px;
      border: 1px dashed #cbd5e1; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 0.75rem; letter-spacing: 0.07em; text-transform: uppercase;
    }
    .top-nav {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 0.7rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-link { color: #0284c7; font-weight: 600; font-size: 0.9rem; }
    .tool-title { font-weight: 700; }

    .wrap { max-width: 960px; margin: 1.5rem auto; padding: 0 1rem; }

    /* Form */
    .form-card {
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 16px; padding: 1.5rem; margin-bottom: 1.2rem;
    }
    .form-card h2 { font-size: 1rem; color: #0284c7; margin-bottom: 1rem; }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
    @media (max-width: 600px) { .fields { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.82rem; font-weight: 600; color: #475569; }
    .field input, .field select, .field textarea {
      border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 0.6rem 0.75rem; font: inherit; background: #f8fafc;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: #0284c7; background: #fff;
    }
    .field.full { grid-column: 1 / -1; }
    .field textarea { resize: vertical; min-height: 70px; }
    .checkboxes { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 0.4rem; }
    .checkboxes label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; }
    .gen-btn {
      width: 100%; padding: 0.82rem;
      background: #0284c7; color: #fff; border: none;
      border-radius: 10px; font: inherit; font-weight: 700;
      font-size: 1rem; cursor: pointer; transition: background 0.2s;
    }
    .gen-btn:hover { background: #0369a1; }

    /* Contract output */
    #contractOut {
      display: none;
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 16px; padding: 0; margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .contract-actions {
      padding: 1rem 1.5rem;
      background: #f8fafc; border-bottom: 1px solid #e2e8f0;
      display: flex; gap: 0.75rem; flex-wrap: wrap;
    }
    .btn-action {
      padding: 0.6rem 1.2rem; border-radius: 8px;
      font: inherit; font-weight: 700; cursor: pointer; font-size: 0.9rem;
    }
    .btn-print { background: #0284c7; color: #fff; border: none; }
    .btn-print:hover { background: #0369a1; }
    .btn-secondary { background: #fff; color: #334155; border: 1px solid #cbd5e1; }
    .btn-secondary:hover { background: #f1f5f9; }
    #contractBody {
      padding: 2rem 2.5rem;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    #contractBody h3 { font-size: 1.1rem; text-align: center; margin-bottom: 0.25rem; }
    #contractBody .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 1.5rem; }
    #contractBody .section-title { font-weight: 700; margin: 1.2rem 0 0.3rem; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.06em; color: #475569; }
    #contractBody table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
    #contractBody td { padding: 0.3rem 0.4rem; vertical-align: top; font-size: 0.88rem; }
    #contractBody td:first-child { width: 40%; font-weight: 600; color: #475569; }
    #contractBody .sig-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2.5rem; }
    #contractBody .sig-box { border-top: 1px solid #e2e8f0; padding-top: 0.5rem; font-size: 0.85rem; color: #64748b; }
    #contractBody .divider { border: none; border-top: 1px solid #e2e8f0; margin: 1rem 0; }
    @media (max-width: 600px) {
      #contractBody { padding: 1.2rem; }
      #contractBody .sig-row { grid-template-columns: 1fr; gap: 1rem; }
    }
    @media print {
      .ad-slot, .top-nav, .form-card, .contract-actions { display: none !important; }
      #contractOut { display: block !important; border: none; }
    }
  </style>
</head>
<body>

<div class="ad-slot">
  <!--
  <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
    data-ad-slot="SLOT_ID_1" data-ad-format="auto" data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  -->
  <div class="ad-ph">Advertisement</div>
</div>

<nav class="top-nav">
  <a class="back-link" href="../index.html">← All Tools</a>
  <span class="tool-title">🏠 Rental Contract Generator</span>
  <span></span>
</nav>

<div class="wrap">

  <!-- LANDLORD -->
  <div class="form-card">
    <h2>Landlord Information</h2>
    <div class="fields">
      <div class="field"><label>Full Name</label><input id="llName" type="text" placeholder="Budi Santoso" /></div>
      <div class="field"><label>ID Number (KTP)</label><input id="llId" type="text" placeholder="3171xxxxxxxxxx" /></div>
      <div class="field full"><label>Address</label><input id="llAddr" type="text" placeholder="Jl. Mawar No. 5, Jakarta" /></div>
      <div class="field"><label>Phone</label><input id="llPhone" type="tel" placeholder="+62 812-0000-0000" /></div>
    </div>
  </div>

  <!-- TENANT -->
  <div class="form-card">
    <h2>Tenant Information</h2>
    <div class="fields">
      <div class="field"><label>Full Name</label><input id="tnName" type="text" placeholder="Dewi Lestari" /></div>
      <div class="field"><label>ID Number (KTP)</label><input id="tnId" type="text" placeholder="3171xxxxxxxxxx" /></div>
      <div class="field full"><label>Address</label><input id="tnAddr" type="text" placeholder="Jl. Melati No. 3, Jakarta" /></div>
      <div class="field"><label>Phone</label><input id="tnPhone" type="tel" placeholder="+62 813-0000-0000" /></div>
    </div>
  </div>

  <!-- PROPERTY -->
  <div class="form-card">
    <h2>Property &amp; Rental Details</h2>
    <div class="fields">
      <div class="field full"><label>Property Address</label><input id="propAddr" type="text" placeholder="Jl. Kenanga No. 10, Depok" /></div>
      <div class="field"><label>Monthly Rent (Rp)</label><input id="rentAmt" type="number" placeholder="3500000" /></div>
      <div class="field"><label>Security Deposit (Rp)</label><input id="depositAmt" type="number" placeholder="3500000" /></div>
      <div class="field"><label>Start Date</label><input id="startDate" type="date" /></div>
      <div class="field"><label>End Date</label><input id="endDate" type="date" /></div>
      <div class="field full">
        <label>Utilities Included in Rent</label>
        <div class="checkboxes">
          <label><input type="checkbox" id="inclWater"> Water</label>
          <label><input type="checkbox" id="inclElec"> Electricity</label>
          <label><input type="checkbox" id="inclInternet"> Internet</label>
          <label><input type="checkbox" id="inclGarbage"> Garbage</label>
        </div>
      </div>
      <div class="field full">
        <label>Additional Notes / Special Clauses</label>
        <textarea id="extraNotes" placeholder="e.g. No pets allowed. Tenant responsible for minor repairs under Rp 200,000."></textarea>
      </div>
    </div>
  </div>

  <button class="gen-btn" onclick="generateContract()">📄 Generate Contract</button>

  <!-- CONTRACT OUTPUT -->
  <div id="contractOut">
    <div class="contract-actions">
      <button class="btn-action btn-print" onclick="window.print()">🖨 Print / Save PDF</button>
      <button class="btn-action btn-secondary" onclick="document.getElementById('contractOut').style.display='none'">✕ Hide</button>
    </div>
    <div id="contractBody"></div>
  </div>

  <div class="ad-slot" style="margin-bottom:2rem">
    <!--
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX"
      data-ad-slot="SLOT_ID_2" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
    <div class="ad-ph">Advertisement</div>
  </div>
</div>

<script>
  function fmtRp(num) {
    return 'Rp ' + parseInt(num || 0).toLocaleString('id-ID');
  }
  function fmtDate(str) {
    if (!str) return '_______________';
    const d = new Date(str + 'T00:00:00');
    return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
  }
  function val(id) { return document.getElementById(id).value.trim() || '_______________'; }
  function chk(id) { return document.getElementById(id).checked; }

  function generateContract() {
    const utils = [chk('inclWater') ? 'Water' : '', chk('inclElec') ? 'Electricity' : '', chk('inclInternet') ? 'Internet' : '', chk('inclGarbage') ? 'Garbage Collection' : ''].filter(Boolean);
    const utilStr = utils.length ? utils.join(', ') : 'None (Tenant pays directly)';
    const notes = document.getElementById('extraNotes').value.trim();

    const html = `
      <h3>HOUSE RENTAL AGREEMENT</h3>
      <p class="subtitle">This agreement is made on ${new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })}</p>
      <hr class="divider" />

      <p class="section-title">Parties</p>
      <table>
        <tr><td>Landlord Name</td><td>${val('llName')}</td></tr>
        <tr><td>Landlord KTP</td><td>${val('llId')}</td></tr>
        <tr><td>Landlord Address</td><td>${val('llAddr')}</td></tr>
        <tr><td>Landlord Phone</td><td>${val('llPhone')}</td></tr>
      </table>
      <table>
        <tr><td>Tenant Name</td><td>${val('tnName')}</td></tr>
        <tr><td>Tenant KTP</td><td>${val('tnId')}</td></tr>
        <tr><td>Tenant Address</td><td>${val('tnAddr')}</td></tr>
        <tr><td>Tenant Phone</td><td>${val('tnPhone')}</td></tr>
      </table>

      <p class="section-title">Property Details</p>
      <table>
        <tr><td>Property Address</td><td>${val('propAddr')}</td></tr>
        <tr><td>Rental Period</td><td>${fmtDate(document.getElementById('startDate').value)} — ${fmtDate(document.getElementById('endDate').value)}</td></tr>
        <tr><td>Monthly Rent</td><td>${fmtRp(document.getElementById('rentAmt').value)}</td></tr>
        <tr><td>Security Deposit</td><td>${fmtRp(document.getElementById('depositAmt').value)}</td></tr>
        <tr><td>Utilities Included</td><td>${utilStr}</td></tr>
      </table>

      <p class="section-title">General Terms &amp; Conditions</p>
      <p>1. The Tenant agrees to pay the monthly rent on or before the 1st of each calendar month.</p>
      <p>2. The security deposit will be returned within 14 days of lease end, minus any deductions for damages beyond normal wear and tear.</p>
      <p>3. The Tenant shall not sublease the property without written consent from the Landlord.</p>
      <p>4. The Tenant shall maintain the property in good condition and report damages promptly.</p>
      <p>5. Either party may terminate this agreement with 30 days written notice.</p>
      <p>6. This agreement shall be governed by the laws of the Republic of Indonesia.</p>
      ${notes ? `<p>7. <strong>Special Clauses:</strong> ${notes}</p>` : ''}

      <hr class="divider" />
      <div class="sig-row">
        <div class="sig-box">
          <p><strong>Landlord</strong></p>
          <br /><br /><br />
          <p>___________________________</p>
          <p>${val('llName')}</p>
        </div>
        <div class="sig-box">
          <p><strong>Tenant</strong></p>
          <br /><br /><br />
          <p>___________________________</p>
          <p>${val('tnName')}</p>
        </div>
      </div>
    `;
    document.getElementById('contractBody').innerHTML = html;
    const out = document.getElementById('contractOut');
    out.style.display = 'block';
    out.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
